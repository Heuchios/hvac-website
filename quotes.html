<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Search | Breezy Boys Mechanical</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .quote-page {
      min-height: calc(100vh - 112px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      background: linear-gradient(180deg, #eef4ff, #f8fbff);
    }

    .search-box {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 36px;
      border-radius: 22px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.75);
    }

    .search-box h2 {
      text-align: center;
      color: #0d47a1;
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .search-box p {
      text-align: center;
      color: #4b5563;
      margin-bottom: 24px;
    }

    .search-box label {
      display: block;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-box input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-box input:focus {
      border-color: #1565c0;
      box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.12);
    }

    .search-box button {
      background: linear-gradient(135deg, #0d47a1, #1565c0);
      color: white;
      border: none;
      padding: 14px 22px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .search-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(21, 101, 192, 0.22);
    }

    .result {
      margin-top: 28px;
      padding-top: 10px;
    }

    .result h3 {
      color: #0f172a;
      margin-bottom: 10px;
      font-size: 1.4rem;
    }

    .result p {
      text-align: left;
      margin-bottom: 8px;
      color: #374151;
    }

    iframe {
      width: 100%;
      height: 700px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      margin-top: 18px;
      background: white;
    }

    .not-found {
      color: #c62828;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .search-box {
        padding: 24px;
        border-radius: 18px;
      }

      .search-box h2 {
        font-size: 1.8rem;
      }

      .search-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="logo">
        <img src="logo.png" alt="Breezy Boys Logo" class="logo-img" />
      </div>

      <nav>
        <a href="index.html">Home</a>
        <a href="quotes.html" class="active">Quote Search</a>
      </nav>
    </div>
  </header>

  <section class="quote-page">
    <div class="container">
      <div class="search-box">
        <h2>Search Your Quote</h2>
        <p>Enter your quote number below to view the quote details.</p>

        <label for="quoteNumber">Quote Number</label>

        <div class="search-row">
          <input type="text" id="quoteNumber" placeholder="Example: Q-1001" />
          <button onclick="searchQuote()">Search</button>
        </div>

        <div id="result" class="result"></div>
      </div>
    </div>
  </section>

  <script src="quotes.js"></script>
</body>
</html>
